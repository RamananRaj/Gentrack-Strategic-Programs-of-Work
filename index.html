<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gentrack Strategic Programs of Work</title>
<link rel="stylesheet" href="styles.css?v=20260617o">
</head>
<body class="view-mode">

<div class="portfolio">
  <span class="pf-title" id="pfTitle">Gentrack Strategic Programs of Work</span>
  <span class="pf-sel">Account
    <select id="accountSel"></select>
  </span>
  <span class="pf-sel">Program
    <select id="programSel"></select>
  </span>
  <span class="spacer"></span>
  <a class="adminlink" href="admin.html">⚙ Admin</a>
</div>

<div id="dash"></div>
<div id="loadMsg" style="padding:40px;text-align:center;color:#64748b"></div>

<script src="app.js?v=20260617o"></script>
<script>
let REG=null;
function qp(k){return new URLSearchParams(location.search).get(k);}
async function jget(p){const r=await fetch(p+'?_='+Date.now());if(!r.ok)throw new Error(r.status);return r.json();}

function buildPickers(){
  const accSel=document.getElementById('accountSel');
  const want=qp('account')||localStorage.getItem('pf_account');
  accSel.innerHTML=REG.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  if(want && REG.accounts.some(a=>a.id===want)) accSel.value=want;
  accSel.onchange=()=>{ localStorage.setItem('pf_account',accSel.value); buildPrograms(); };
  buildPrograms();
}
function currentAccount(){ return REG.accounts.find(a=>a.id===document.getElementById('accountSel').value)||REG.accounts[0]; }
function buildPrograms(){
  const acc=currentAccount();
  const pSel=document.getElementById('programSel');
  const want=qp('program')||localStorage.getItem('pf_program');
  pSel.innerHTML=(acc.programs||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(want && acc.programs.some(p=>p.id===want)) pSel.value=want;
  pSel.onchange=()=>{ localStorage.setItem('pf_program',pSel.value); loadSelected(); };
  loadSelected();
}
async function loadSelected(){
  const acc=currentAccount();
  const prog=acc.programs.find(p=>p.id===document.getElementById('programSel').value)||acc.programs[0];
  if(!prog){ document.getElementById('dash').innerHTML=''; document.getElementById('loadMsg').textContent='No programs under this account yet.'; return; }
  try{
    const data=await jget(prog.file);
    document.getElementById('loadMsg').textContent='';
    setData(data); EDIT=false; renderAll();
  }catch(e){
    document.getElementById('dash').innerHTML='';
    document.getElementById('loadMsg').textContent='Could not load program data ('+prog.file+'). View this on the published site, or serve the folder over http.';
  }
}

async function boot(){
  mountDashboard('dash');
  document.body.classList.add('view-mode');
  try{ REG=await jget('registry.json'); }
  catch(e){ document.getElementById('loadMsg').textContent='Could not load registry.json. Open this on the published GitHub Pages site (file:// can’t fetch).'; return; }
  document.getElementById('pfTitle').textContent=REG.portfolio||'Strategic Programs';
  document.title=REG.portfolio||'Strategic Programs';
  buildPickers();
}
boot();
</script>
</body>
</html>
